<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Factory</title>
  <meta
    name="description"
    content="Prompt Factory — industrial-style AI prompt optimizer that transforms raw prompts into polished results."
  />
  <link rel="icon" type="image/svg+xml" href="gear.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>PROMPT<br>FACTORY</h1>
        <p>RAW PROMPT ⇨ OPTIMIZED RESULT</p>
      </div>

      <div class="gear-wrap" aria-hidden="true">
        <svg class="gear gear-big" viewBox="0 0 100 100">
          <path d="M57 4l3 10a36 36 0 0 1 8 3l9-5 7 7-5 9a36 36 0 0 1 3 8l10 3v10l-10 3a36 36 0 0 1-3 8l5 9-7 7-9-5a36 36 0 0 1-8 3l-3 10H47l-3-10a36 36 0 0 1-8-3l-9 5-7-7 5-9a36 36 0 0 1-3-8L12 49V39l10-3a36 36 0 0 1 3-8l-5-9 7-7 9 5a36 36 0 0 1 8-3l3-10h10zM50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
        </svg>

        <svg class="gear gear-small" viewBox="0 0 100 100">
          <path d="M57 4l3 10a36 36 0 0 1 8 3l9-5 7 7-5 9a36 36 0 0 1 3 8l10 3v10l-10 3a36 36 0 0 1-3 8l5 9-7 7-9-5a36 36 0 0 1-8 3l-3 10H47l-3-10a36 36 0 0 1-8-3l-9 5-7-7 5-9a36 36 0 0 1-3-8L12 49V39l10-3a36 36 0 0 1 3-8l-5-9 7-7 9 5a36 36 0 0 1 8-3l3-10h10zM50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
        </svg>
      </div>
    </header>

    <section class="panel">
      <label for="promptInput" class="section-title">My prompt</label>

      <textarea
        id="promptInput"
        placeholder="Write your raw prompt here..."
      ></textarea>

      <div class="controls">
        <select id="modeSelect" aria-label="Prompt mode">
          <option value="professional">Professional</option>
          <option value="creative">Creative</option>
          <option value="academic">Academic</option>
          <option value="business">Business</option>
        </select>

        <button id="exampleBtn" class="secondary-btn" type="button">
          Example
        </button>
      </div>

      <button id="optimizeBtn" class="main-btn" type="button">
        Optimize
      </button>

      <p id="statusText" class="status-text">Factory ready</p>
    </section>

    <section class="result-card">
      <div class="result-header">Result</div>

      <div id="resultText" class="result-body">
        Your optimized prompt will appear here...
      </div>

      <button id="copyBtn" class="copy-btn" type="button" aria-label="Copy result" title="Copy result">
        <svg viewBox="0 0 24 24">
          <rect x="9" y="9" width="11" height="11" rx="2"></rect>
          <path d="M5 15V6a2 2 0 0 1 2-2h9"></path>
        </svg>
      </button>
    </section>

    <div id="toast" class="toast">Copied</div>
  </main>

  <script src="script.js"></script>
</body>
</html>

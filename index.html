<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Factory</title>
  <meta
    name="description"
    content="Prompt Factory — hybrid prompt optimizer with analysis, scoring, rewrite engine, tips, explanations, and history."
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <div class="hero-left">
        <div class="logo-wrap" aria-hidden="true">
          <link rel="icon" type="image/svg+xml" href="gear.svg" />
          <svg class="logo-gear big" viewBox="0 0 100 100">
            <path d="M57 4l3 10a36 36 0 0 1 8 3l9-5 7 7-5 9a36 36 0 0 1 3 8l10 3v10l-10 3a36 36 0 0 1-3 8l5 9-7 7-9-5a36 36 0 0 1-8 3l-3 10H47l-3-10a36 36 0 0 1-8-3l-9 5-7-7 5-9a36 36 0 0 1-3-8L12 49V39l10-3a36 36 0 0 1 3-8l-5-9 7-7 9 5a36 36 0 0 1 8-3l3-10h10zM50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
          </svg>
          <svg class="logo-gear small" viewBox="0 0 100 100">
            <path d="M57 4l3 10a36 36 0 0 1 8 3l9-5 7 7-5 9a36 36 0 0 1 3 8l10 3v10l-10 3a36 36 0 0 1-3 8l5 9-7 7-9-5a36 36 0 0 1-8 3l-3 10H47l-3-10a36 36 0 0 1-8-3l-9 5-7-7 5-9a36 36 0 0 1-3-8L12 49V39l10-3a36 36 0 0 1 3-8l-5-9 7-7 9 5a36 36 0 0 1 8-3l3-10h10zM50 35a15 15 0 1 0 0 30 15 15 0 0 0 0-30z"/>
          </svg>
        </div>

        <div>
          <h1 id="heroTitle">Prompt Factory</h1>
          <p id="heroSubtitle">Algorithm-based prompt optimizer</p>
        </div>
      </div>

      <button id="langToggle" class="lang-toggle" type="button">RU</button>
    </header>

    <section class="panel">
      <textarea
        id="promptInput"
        placeholder="Write your prompt..."
        aria-label="Prompt input"
      ></textarea>

      <div class="controls">
        <select id="roleSelect" aria-label="Role hint">
          <option value="auto">Auto</option>
          <option value="learn">Learning</option>
          <option value="explain">Explain</option>
          <option value="story">Story</option>
          <option value="code">Coding</option>
          <option value="marketing">Marketing</option>
          <option value="compare">Compare</option>
          <option value="create">Create</option>
        </select>

        <button id="optimizeBtn" class="main-btn" type="button">Optimize</button>
      </div>

      <div class="status-pill" id="statusText">Ready</div>
    </section>

    <section class="score-box box">
      <div class="box-title-row">
        <h2 id="scoreTitle">Prompt Score</h2>
        <span id="scoreValue">0 / 10</span>
      </div>

      <div class="score-bar">
        <div id="scoreFill" class="score-fill"></div>
      </div>
    </section>

    <section class="analysis-box box">
      <div class="box-title-row">
        <h2 id="analysisTitle">Prompt Analysis</h2>
      </div>

      <div id="analysisText" class="analysis-grid">
        <div><span>Language:</span> —</div>
        <div><span>Intent:</span> —</div>
        <div><span>Topic:</span> —</div>
        <div><span>Audience:</span> —</div>
        <div><span>Time:</span> —</div>
        <div><span>Use case:</span> —</div>
      </div>
    </section>

    <section class="tips-box box">
      <div class="box-title-row">
        <h2 id="tipsTitle">Prompt Improvement Tips</h2>
      </div>
      <div id="tipsText" class="tips-list">Add a prompt to get suggestions.</div>
    </section>

    <section class="result-box box">
      <div class="box-title-row">
        <h2 id="resultTitle">Result</h2>
        <div class="result-actions">
          <button id="copyBtn" class="ghost-btn" type="button">Copy</button>
          <button id="explainBtn" class="ghost-btn" type="button">Explain Improvements</button>
        </div>
      </div>

      <pre id="resultText" class="result-text">Your optimized prompt will appear here...</pre>

      <div id="explainBox" class="explain-box hidden"></div>
    </section>

    <section class="history-box box">
      <div class="box-title-row">
        <h2 id="historyTitle">Prompt History</h2>
      </div>
      <div id="historyList" class="history-list"></div>
    </section>
  </main>

  <div id="toast" class="toast">Copied</div>

  <script src="script.js"></script>
</body>
</html>
